<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cerverus</title>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <style>
        :root {
            --bg: #0f1115;
            --fg: #e6e6e6;
            --accent: #5eead4;
            --muted: #9ca3af;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        main {
            max-width: 700px;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        p {
            color: var(--muted);
            margin: 0.5rem 0;
        }

        button {
            margin-top: 1rem;
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: black;
            cursor: pointer;
            font-weight: 600;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--muted);
        }

        code {
            background: #1a1d24;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<main>
    <h1>Cerverus</h1>

    <p>A minimal high-performance webserver written in <code>C</code>.</p>
    <p>Designed for speed, simplicity, and modern hypermedia.</p>

    <!-- HTMX test button -->
    <button 
        hx-get="/htmx-test" 
        hx-target="#htmx-result"
        hx-swap="innerHTML">
        Test HTMX
    </button>

    <!-- Result area -->
    <div id="htmx-result" style="margin-top:1rem;color:var(--accent);"></div>

    <footer>
        Powered by Cerverus
    </footer>
</main>

</body>
</html>
